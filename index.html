<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>War Era Tools</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Saira:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="banner">SA MoE Tools</header>
  <main class="split">
    <section class="panel left">
      <h1>South Africa Fundraiser</h1>
      <div class="control">
        <label for="fundraiser-start">Fundraiser Start Date (yyyy-mm-dd)</label>
        <input id="fundraiser-start" type="date" value="2026-03-11" />
      </div>
      <div class="control">
        <label for="fundraiser-target">Target Amount (int)</label>
        <input id="fundraiser-target" type="number" min="1" step="1" value="1000" />
      </div>
      <button type="button" onclick="Fundraiser()">Refresh</button>
      <p id="fundraiser-status" class="status"></p>
      <pre id="fundraiser-output" class="output"></pre>
      <div class="chart-wrap">
        <canvas id="fundraiser-chart"></canvas>
      </div>
    </section>
    <section class="panel right">
      <!-- Right side content goes here -->
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <script src="scripts.js"></script>
</body>
</html>
